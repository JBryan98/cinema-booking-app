server:
  port: 51000
spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: movie-service
              uri: http://localhost:51100
              predicates:
                - Path=/api/v1/movies/**, /api/v1/screenings/**
            - id: booking-service
              uri: http://localhost:51200
              predicates:
                - Path=/api/v1/bookings/**
            - id: booking-orchestrator-service
              uri: http://localhost:51400
              predicates:
                - Path=/api/v1/booking-placements/**,
            - id: auth-service
              uri: http://localhost:50003
              predicates:
                - Path=/api/v1/auth/**, /api/v1/oauth2/**

            # ————————————————————————API-DOCS———————————————————————————————————————
            - id: movie-service-docs
              uri: http://localhost:51100
              predicates:
                - Path=/movie-service/api-docs
              filters:
                - SetPath=/api/v1/v3/api-docs
            - id: booking-service-docs
              uri: http://localhost:51200
              predicates:
                - Path=/booking-service/api-docs
              filters:
                - SetPath=/api/v1/v3/api-docs
            - id: booking-orchestrator-service-docs
              uri: http://localhost:51400
              predicates:
                - Path=/booking-orchestrator-service/api-docs
              filters:
                - SetPath= /api/v1/v3/api-docs
            - id: auth-service-docs
              uri: http://localhost:50003
              predicates:
                - Path=/auth-service/api-docs
              filters:
                - SetPath=/api/v1/v3/api-docs

# Configuración para centralizar Swagger
springdoc:
  swagger-ui:
    # Habilita el combo/desplegable para cambiar entre microservicios
    urls:
      - name: Movie Service
        url: /movie-service/api-docs
      - name: Booking Service
        url: /booking-service/api-docs
      - name: Booking Orchestrator Service
        url: /booking-orchestrator-service/api-docs
      - name: Auth Service
        url: /auth-service/api-docs