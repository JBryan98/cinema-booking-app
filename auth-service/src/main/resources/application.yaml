server:
  port: 50003
  servlet:
    context-path: /api/v1

spring:
  application:
    name: auth-service

# ── JWT RS256 ───────────────────────────────────────────────────────────────
# Configuración del emisor de tokens JWT.
# Las claves RSA se generan en memoria al arrancar (JwkConfig).
# Para producción: persistir keypair en un KeyStore o secrets manager.
auth:
  jwt:
    # Valor del claim "iss" en los tokens emitidos.
    # Los Resource Servers deben configurar issuer-uri igual a este valor
    # para que la validación de issuer sea exitosa.
    issuer: http://localhost:50003

    # Tiempo de vida del accessToken en segundos (1 hora)
    access-token-ttl: 3600

    # Tiempo de vida del refreshToken en segundos (24 horas)
    refresh-token-ttl: 86400

# ── Actuator ───────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always
